<div class="page-container">
  <nav class="add-product-navbar">
    <div class="nav-brand">ShopEZ Admin</div>
    <div class="nav-links">
      <a (click)="navigateToDashboard()">Dashboard</a>
      <a (click)="navigateToViewProducts()">View All Products</a>
      <a (click)="onLogout()" class="logout-btn">Logout</a>
    </div>
  </nav>

  <div class="form-content-area">
    <div class="product-form-card shadow-lg">
      <div class="card-header text-center mb-4">
        <h2>Add Product</h2>
        <p class="text-muted">Fill in details to expand inventory</p>
      </div>

      <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="modern-form">
        
        <div class="row mb-3 align-items-center">
          <label class="col-sm-4 custom-label">Product Name</label>
          <div class="col-sm-8">
            <input type="text" class="custom-input" formControlName="name" placeholder="Letters/Numbers only">
          </div>
        </div>

       
        <div class="row mb-3 align-items-center">
          <label class="col-sm-4 custom-label">Price (₹)</label>
          <div class="col-sm-8">
            <input type="number" class="custom-input" formControlName="price" placeholder="0.00">
          </div>
        </div>

        <div class="row mb-3 align-items-center">
          <label class="col-sm-4 custom-label">Category</label>
          <div class="col-sm-8">
            <select class="custom-select" formControlName="category">
              <option value="">Select Category</option>
              <option value="Electronics">Electronics</option>
              <option value="Fashion">Fashion</option>
              <option value="Toys">Toys</option>
              <option value="Sports">Sports</option>
              <option value="Womens Wear">Womenwear</option>
              <option value="Home">Home & Kitchen</option>
            </select>
          </div>
        </div>
        <div class="row mb-3 align-items-center">
  <label class="col-sm-4 custom-label">Stock Quantity</label>
  <div class="col-sm-8">
    <input type="number" class="custom-input" formControlName="quantity" placeholder="0">
  </div>
</div>

        <div class="row mb-3">
          <label class="col-sm-4 custom-label mt-1">Description</label>
          <div class="col-sm-8">
            <textarea class="custom-textarea" rows="3" formControlName="description" placeholder="Provide product details (min 10 chars)..."></textarea>
            <small class="text-danger" *ngIf="productForm.get('description')?.touched && productForm.get('description')?.invalid">
              Description is required (min 10 chars).
            </small>
          </div>
        </div>

        <div class="row mb-4 align-items-center">
          <label class="col-sm-4 custom-label">Product Image</label>
          <div class="col-sm-8">
            <div class="upload-area" (click)="fileInput.click()">
              <i class="bi bi-camera me-2"></i> {{imagePreview ? 'Change Image' : 'Upload Image'}}
            <input #fileInput type="file" 
       (change)="onFileSelected($event)" 
       accept=".jpg,.jpeg,.png,.jfif"
       hidden>
            </div>
            <div *ngIf="imagePreview" class="mt-2 text-center">
              <img [src]="imagePreview" class="img-thumbnail shadow-sm" style="max-height: 80px;">
            </div>
          </div>
        </div>

        <button type="submit" class="btn-submit" [disabled]="productForm.invalid">
           Save Product
        </button>
      </form>
    </div>
  </div>
</div>

<!-- Toast Notification -->
<div class="toast-notification" *ngIf="showToast">
  Product added successfully!
</div>
