<div class="dashboard-container">
    <!-- ADD THIS OVERLAY DIV -->
    <div class="sidebar-overlay" [class.active]="isSidebarOpen && isMobile" (click)="toggleSidebar()"></div>
    <aside class="sidebar" [class.active]="isSidebarOpen">
        <div class="logo">Shop<span>eZ</span> Admin</div>

        <button class="sidebar-toggle" (click)="toggleSidebar()">
            <i class="bi" [ngClass]="isSidebarOpen ? 'bi-chevron-left' : 'bi-chevron-right'"></i>
        </button>
        <nav class="menu">
            <button class="menu-btn" [class.active]="currentView === 'users'" (click)="setView('users')">
                <i class="bi bi-people"></i>
                <span>Total Users</span>
            </button>

            <button class="menu-btn" (click)="navigateToAdd()">
                <i class="bi bi-plus-circle"></i>
                <span>Add Product</span>
            </button>

            <button class="menu-btn" [class.active]="currentView === 'products'" (click)="setView('products')">
                <i class="bi bi-box-seam"></i>
                <span>View Products</span>
            </button>
            <button class="menu-btn" [class.active]="currentView === 'orders'" (click)="setView('orders')">
                <i class="bi bi-cart-check"></i>
                <span>View Orders</span>
            </button>

            <button class="menu-btn logout" (click)="onLogout()">
                <i class="bi bi-box-arrow-right"></i>
                <span>Logout</span>
            </button>
        </nav>
    </aside>

    <main class="main-content">
        <header class="main-header">
            <div class="header-top">
                <button class="menu-toggle" (click)="toggleSidebar()"><i class="bi bi-list"></i></button>
                <h2>
                    {{ currentView === 'products' ? 'Product Overview' :
                    currentView === 'users' ? 'User Management' : 'Order Management' }}
                </h2>
            </div>

            <!-- Only show these filters when in products view -->
            <div class="header-actions" *ngIf="currentView === 'products'">
                <!-- Category -->
                <select [formControl]="categoryControl">
                    <option value="">All Categories</option>
                    <option *ngFor="let cat of ['Electronics','Clothes','Toys','Books']" [value]="cat">{{ cat }}
                    </option>
                </select>

                <!-- Price -->
                <input type="number" [formControl]="priceControl" placeholder="Max Price" />

                <!-- Search -->
                <input type="text" [formControl]="searchControl" placeholder="Search..." class="search-input" />
            </div>
        </header>

        <div class="content-area">
            <!-- Product List -->
            <app-viewproductlist *ngIf="currentView === 'products'" [searchTerm]="searchControl.value || ''"
                [filterCategory]="categoryControl.value || ''" [filterPrice]="priceControl.value">
            </app-viewproductlist>

            <!-- User List -->
            <div *ngIf="currentView === 'users'">
                <div class="user-filters">
                    <input type="text" [formControl]="searchControl" placeholder="Search by name or email"
                        class="search-input" />
                    <select [formControl]="categoryControl">
                        <option value="">All Roles</option>
                        <option *ngFor="let r of ['ADMIN','USER']" [value]="r">{{ r }}</option>
                    </select>
                </div>

                <app-userlist [searchTerm]="searchControl.value || ''" [filterRole]="categoryControl.value || ''">
                </app-userlist>
            </div>
            <!-- Order history-->
            <div *ngIf="currentView === 'orders'">
                <div class="order-filters">
                    <select [formControl]="categoryControl">
                        <option value="">All Statuses</option>
                        <option value="PENDING">Pending</option>
                        <option value="SHIPPED">Shipped</option>
                        <option value="DELIVERED">Delivered</option>
                        <option value="CANCELLED">Cancelled</option>
                    </select>
                    <input type="text" [formControl]="searchControl" placeholder="Search product or customer..."
                        class="search-input" />
                </div>

                <app-orderhistory [isAdmin]="true" [filterStatus]="categoryControl.value || ''"
                    [searchTerm]="searchControl.value || ''">
                </app-orderhistory>
            </div>
        </div>
    </main>
</div>


<div class="logout-overlay" *ngIf="showLogoutPopup">
    <div class="logout-modal shadow">
        <div class="modal-icon">
            <i class="bi bi-exclamation-circle text-warning"></i>
        </div>
        <h3>Confirm Logout</h3>
        <p>Are you sure you want to logout of the Admin Dashboard?</p>
        <div class="modal-actions">
            <button class="btn-confirm" (click)="confirmLogout()">Yes, Logout</button>
            <button class="btn-cancel" (click)="cancelLogout()">No, Stay</button>
        </div>
    </div>
</div>
