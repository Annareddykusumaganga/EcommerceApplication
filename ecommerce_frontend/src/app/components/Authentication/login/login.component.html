<div class="login-container">

  <div class="login-card">

    <!-- Back -->
    <a routerLink="/" class="back-home">
      <i class="bi bi-arrow-left"></i> Back to Home
    </a>

    <h2>Login</h2>
    <p class="subtitle">Welcome back to ShopeZ</p>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">

      <!-- Username -->
      <div class="row mb-3 align-items-center">
        <label class="col-sm-4 col-form-label">Username</label>
        <div class="col-sm-8">
          <input type="text" class="form-control"
                 formControlName="username"
                 placeholder="Enter username">

          <small class="text-danger"
                 *ngIf="f['username'].touched && f['username'].invalid">
            Invalid Username
          </small>
        </div>
      </div>

      <!-- Password -->
      <div class="row mb-3 align-items-center">
        <label class="col-sm-4 col-form-label">Password</label>
        <div class="col-sm-8 position-relative">

          <input [type]="showPassword ? 'text' : 'password'"
                 class="form-control pe-5"
                 formControlName="password">

          <span class="eye-icon" (click)="togglePassword()">
            <i class="bi"
               [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
          </span>

          <small class="text-danger d-block mt-1"
                 *ngIf="f['password'].touched && f['password'].invalid">
            Invalid Password
          </small>
        </div>
      </div>

      <div class="text-right mb-2">
        <a routerLink="/forgot-password" class="text-link" style="cursor:pointer; font-size: 0.9rem;">Forgot Password?</a>
      </div>

      <!-- Button -->
      <button type="submit" class="btn btn-primary w-100 mt-3">
        Login
      </button>

    </form>

    <!-- Register Redirect -->
    <p class="login-link mt-3">
      Don’t have an account?
      <a routerLink="/register">Create Account</a>
    </p>

  </div>

  <!-- Toast -->
 <!-- <div class="toast-box"
       [ngClass]="{'error-toast': toastType === 'error'}"
       *ngIf="toastMessage">
    {{ toastMessage }}
  </div> -->

</div>
